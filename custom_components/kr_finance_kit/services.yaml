refresh_now:
  name: Refresh now
  description: Trigger an immediate refresh of market and disclosure data.

add_position:
  name: Add / update holding
  description: >
    Add or update a holding (quantity + average purchase price). Stored
    in encrypted ConfigEntry options — never persisted to source files.
    ⚠ KR / US stocks only — crypto, FX, futures (BTC-USD, EUR=X, GC=F …)
    expose price sensors only; portfolio tracking is not supported.
  fields:
    ticker:
      name: Ticker / symbol
      description: KR stock code (e.g. 005930, 035720.KQ) or US symbol (e.g. AAPL).
      required: true
      example: "005930"
      selector:
        text:
    quantity:
      name: Quantity
      description: Number of shares.
      required: true
      example: "10"
      selector:
        number:
          min: 0
          max: 1000000000
          mode: box
    avg_price:
      name: Average price
      description: >
        Average purchase price in the market's native currency — KR
        positions in KRW (won), US positions in USD. Don't pre-convert;
        the integration does the FX conversion for KRW totals.
      required: true
      example: "60000"
      selector:
        number:
          min: 0
          max: 1000000000
          mode: box
    market:
      name: Market
      description: KR (Korea) or US (United States). Crypto / FX tickers can't be selected here.
      required: true
      default: "KR"
      selector:
        select:
          options:
            - KR
            - US

remove_position:
  name: Remove holding
  description: Remove a previously added position. Matched by ticker + market.
  fields:
    ticker:
      name: Ticker / symbol
      description: Ticker code or symbol to remove.
      required: true
      example: "005930"
      selector:
        text:
    market:
      name: Market
      description: KR (Korea) or US (United States).
      required: true
      default: "KR"
      selector:
        select:
          options:
            - KR
            - US
