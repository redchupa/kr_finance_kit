refresh_now:
  name: 즉시 갱신
  description: Trigger an immediate refresh of market and disclosure data.

add_position:
  name: 보유 종목 추가/수정
  description: |
    Add or update a holding (quantity + average purchase price). Stored
    in encrypted ConfigEntry options — never persisted to source files.
  fields:
    ticker:
      name: 종목 코드/심볼
      description: KR 종목 코드 (예 005930) 또는 US 심볼 (예 AAPL).
      required: true
      selector:
        text:
    quantity:
      name: 수량
      description: Number of shares.
      required: true
      selector:
        number:
          mode: box
          min: 0
          step: 0.0001
    avg_price:
      name: 평단가
      description: Average purchase price in market currency.
      required: true
      selector:
        number:
          mode: box
          min: 0
          step: 0.01
    market:
      name: 시장
      description: KR or US.
      required: true
      selector:
        select:
          options:
            - KR
            - US

remove_position:
  name: 보유 종목 삭제
  description: Remove a previously added position.
  fields:
    ticker:
      name: 종목 코드/심볼
      required: true
      selector:
        text:
    market:
      name: 시장
      required: true
      selector:
        select:
          options:
            - KR
            - US
