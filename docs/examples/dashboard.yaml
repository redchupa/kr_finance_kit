# KR Finance Kit — sample dashboard (v0.1.61+)
#
# Pure-Markdown layout. Slim, vertical, no heavy chart cards except
# one ApexCharts portfolio trend. Designed to work on both desktop
# and mobile (max_columns: 1).
#
# How to use:
#   1. Settings → Dashboards → ⋮ Edit dashboard → ⋮ Raw configuration editor
#   2. Paste this view into your dashboard's `views:` list
#   3. Adjust the ticker entity_ids in section 5 / 6 to your own
#
# HACS card dependencies:
#   - apexcharts-card   (RomRider/apexcharts-card)
#
# Optional (replaceable with built-in cards):
#   - none — every card except the chart is a built-in Markdown card.
#
# All Markdown tables read the live state of `sensor.fi_*` entities
# the integration creates. The holdings table reads
# `sensor.fi_portfolio_krw_pl` 's `positions` attribute (v0.1.61+).
title: KR Finance Kit
path: kr-finance
icon: mdi:chart-line
type: sections
max_columns: 1
sections:

  # ── 1. Hero header ──────────────────────────────────────────────
  - type: grid
    cards:
      - type: markdown
        content: |
          # 📊 KR Finance Kit
          한국·미국 주식 · 환율 · 암호화폐 · OpenDart 공시 — **한눈에**

  # ── 2. Portfolio KPI table ──────────────────────────────────────
  - type: grid
    cards:
      - type: markdown
        content: |
          ### 💼 포트폴리오 현황

          | 시장 | 평가금액 | 평가손익 |
          |:---|---:|---:|
          | 🇰🇷 한국 | `{{ '{:,.0f}'.format(states('sensor.fi_portfolio_kr_value')|float(0)) }}원` | {% set v = states('sensor.fi_portfolio_kr_pl')|float(0) %}{% if v>0 %}🟢{% elif v<0 %}🔴{% else %}⚪{% endif %} `{{ '+' if v>0 else '' }}{{ '{:,.0f}'.format(v) }}원` |
          | 🇺🇸 미국 | `${{ '{:,.2f}'.format(states('sensor.fi_portfolio_us_value')|float(0)) }}` | {% set v = states('sensor.fi_portfolio_us_pl')|float(0) %}{% if v>0 %}🟢{% elif v<0 %}🔴{% else %}⚪{% endif %} `{{ '+' if v>0 else '' }}${{ '{:,.2f}'.format(v) }}` |
          | 💰 **합계 (KRW)** | **`{{ '{:,.0f}'.format(states('sensor.fi_portfolio_krw_total')|float(0)) }}원`** | {% set v = states('sensor.fi_portfolio_krw_pl')|float(0) %}{% if v>0 %}🟢{% elif v<0 %}🔴{% else %}⚪{% endif %} **`{{ '+' if v>0 else '' }}{{ '{:,.0f}'.format(v) }}원`** |

  # ── 3. Per-position holdings table ──────────────────────────────
  # Reads sensor.fi_portfolio_krw_pl 's 'positions' attribute, added
  # by the integration in v0.1.61. Shows ticker / qty / avg / now /
  # P/L %. Empty state nudges the user to add_position.
  - type: grid
    cards:
      - type: markdown
        content: |
          ### 📦 보유 종목 현황

          {% set ps = state_attr('sensor.fi_portfolio_krw_pl', 'positions') or [] %}
          {% if ps %}
          | 종목 | 수량 | 평단가 | 현재가 | 손익률 |
          |:---|---:|---:|---:|---:|
          {% for p in ps %}{% set ind = '🟢' if p.pl > 0 else '🔴' if p.pl < 0 else '⚪' %}{% if p.market == 'US' %}| 🇺🇸 {{ p.ticker }} | `{{ p.quantity|int if p.quantity == p.quantity|int else p.quantity }}` | `${{ '{:,.2f}'.format(p.avg_price) }}` | `${{ '{:,.2f}'.format(p.current_price) }}` | {{ ind }} `{{ '+' if p.pl_pct>0 else '' }}{{ p.pl_pct }}%` |
          {% else %}| 🇰🇷 {{ p.ticker }} | `{{ p.quantity|int if p.quantity == p.quantity|int else p.quantity }}` | `{{ '{:,.0f}'.format(p.avg_price) }}원` | `{{ '{:,.0f}'.format(p.current_price) }}원` | {{ ind }} `{{ '+' if p.pl_pct>0 else '' }}{{ p.pl_pct }}%` |
          {% endif %}{% endfor %}
          {% else %}
          _보유 종목이 없습니다. **개발자 도구 → 동작 → `kr_finance_kit.add_position`** 으로 추가하세요._
          {% endif %}

  # ── 4. Portfolio 30-day chart (only ApexCharts card) ────────────
  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: 📈 포트폴리오 30일 (총 평가금액 KRW)
          show_states: true
          colorize_states: true
        graph_span: 30d
        span:
          end: day
        apex_config:
          chart:
            height: 250
          grid:
            borderColor: rgba(255,255,255,0.08)
          stroke:
            width: 2
            curve: smooth
          fill:
            type: gradient
            gradient:
              shadeIntensity: 1
              opacityFrom: 0.45
              opacityTo: 0.05
              stops: [0, 90, 100]
          dataLabels:
            enabled: false
          xaxis:
            tickAmount: 15
            labels:
              show: true
              format: M/d
              rotate: -45
              rotateAlways: true
              hideOverlappingLabels: false
              style:
                fontSize: 9px
          yaxis:
            show: true
            labels:
              formatter: |
                EVAL:value => value.toLocaleString()
              style:
                fontSize: 10px
          tooltip:
            enabled: true
            x:
              format: MM월 dd일
        series:
          - entity: sensor.fi_portfolio_krw_total
            name: 총 평가금액 (KRW)
            color: "#1abc9c"
            stroke_width: 2
            type: area
            group_by:
              func: avg
              duration: 1d
            show:
              in_header: true
              legend_value: false

  # ── 5. Indices & FX table (10 rows) ─────────────────────────────
  - type: grid
    cards:
      - type: markdown
        content: |
          ### 🌐 지수 & 환율

          | 지수 | 현재값 | 등락률 |
          |:---|---:|---:|
          {% for e, l in [
            ('sensor.fi_kospi','🇰🇷 KOSPI'),
            ('sensor.fi_kosdaq','🇰🇷 KOSDAQ'),
            ('sensor.fi_usdkrw','💱 USD/KRW'),
            ('sensor.fi_nasdaq','🇺🇸 NASDAQ'),
            ('sensor.fi_dow','🇺🇸 DOW'),
            ('sensor.fi_sp500','🇺🇸 S&P 500'),
            ('sensor.fi_nikkei','🇯🇵 NIKKEI'),
            ('sensor.fi_hangseng','🇭🇰 HANGSENG'),
            ('sensor.fi_ftse','🇬🇧 FTSE'),
            ('sensor.fi_dax','🇩🇪 DAX')
          ] %}{% set p = state_attr(e,'change_pct')|float(0) %}{% set i = '🟢' if p>0 else '🔴' if p<0 else '⚪' %}| {{ l }} | `{{ '{:,.2f}'.format(states(e)|float(0)) }}` | {{ i }} `{{ '+' if p>0 else '' }}{{ p }}%` |
          {% endfor %}

  # ── 6. Ticker prices table (KR + US + crypto/FX/futures all in one) ──
  # Replace the entity list with your own ticker entity_ids — the
  # third tuple element is the currency suffix ('원' / '$').
  - type: grid
    cards:
      - type: markdown
        content: |
          ### 📊 종목 시세

          | 종목 | 현재가 | 등락률 |
          |:---|---:|---:|
          {% for e, l, c in [
            ('sensor.fi_kr_005930','🇰🇷 삼성전자','원'),
            ('sensor.fi_kr_000660','🇰🇷 SK하이닉스','원'),
            ('sensor.fi_kr_035420','🇰🇷 NAVER','원'),
            ('sensor.fi_kr_035720_kq','🇰🇷 카카오','원'),
            ('sensor.fi_kr_373220','🇰🇷 LG에너지솔루션','원'),
            ('sensor.fi_us_aapl','🇺🇸 Apple','$'),
            ('sensor.fi_us_msft','🇺🇸 Microsoft','$'),
            ('sensor.fi_us_tsla','🇺🇸 Tesla','$'),
            ('sensor.fi_us_nvda','🇺🇸 NVIDIA','$'),
            ('sensor.fi_other_btc_usd','🪙 Bitcoin','$'),
            ('sensor.fi_other_eth_usd','🪙 Ethereum','$'),
            ('sensor.fi_other_eur_x','💱 EUR/USD','$'),
            ('sensor.fi_other_gc_f','🥇 Gold','$'),
            ('sensor.fi_other_cl_f','🛢️ Oil','$')
          ] %}{% set price = states(e)|float(0) %}{% set p = state_attr(e,'change_pct')|float(0) %}{% set i = '🟢' if p>0 else '🔴' if p<0 else '⚪' %}| {{ l }} | `{% if c=='$' %}${{ '{:,.2f}'.format(price) }}{% else %}{{ '{:,.0f}'.format(price) }}{{ c }}{% endif %}` | {{ i }} `{{ '+' if p>0 else '' }}{{ p }}%` |
          {% endfor %}

  # ── 7. OpenDart disclosures (live list) ─────────────────────────
  # Replace the disclosure entity_ids + labels with your own corps.
  - type: grid
    cards:
      - type: markdown
        content: |
          ## 📋 신규 공시 (OpenDart · 최근 24시간)

          {% set ns = namespace(any_active=false) %}
          {% set disclosures = [
            {'name': '🏢 삼성전자', 'entity': 'binary_sensor.fi_disclosure_00126380'},
            {'name': '💾 SK하이닉스', 'entity': 'binary_sensor.fi_disclosure_00164779'},
            {'name': '🟢 NAVER', 'entity': 'binary_sensor.fi_disclosure_00266961'},
            {'name': '🟡 카카오', 'entity': 'binary_sensor.fi_disclosure_00258801'},
            {'name': '🔋 LG에너지솔루션', 'entity': 'binary_sensor.fi_disclosure_01515323'}
          ] %}
          {% for d in disclosures %}{% if is_state(d.entity, 'on') %}{% set ns.any_active = true %}---

          🔴 **{{ d.name }}** · *NEW*

          📝 {{ state_attr(d.entity, 'report_nm') or '제목 정보 없음' }}

          🕐 {{ state_attr(d.entity, 'rcept_dt') or '-' }}{% if state_attr(d.entity, 'url') %} · [📄 보고서 열기]({{ state_attr(d.entity, 'url') }}){% endif %}

          {% endif %}{% endfor %}{% if not ns.any_active %}_최근 24시간 신규 공시 없음 — 종목별 모니터링 활성_

          {% for d in disclosures %}⚪ {{ d.name }}{% if not loop.last %} · {% endif %}{% endfor %}{% endif %}

  # ── 8. Quick links ──────────────────────────────────────────────
  - type: grid
    cards:
      - type: markdown
        content: |
          ### 🔗 빠른 링크
          - [개발자 도구 → 동작 (보유 종목 추가)](/developer-tools/action?service=kr_finance_kit.add_position)
          - [통합 옵션 (종목 추가/삭제)](/config/integrations)
          - [블루프린트 자동화](/config/automation/dashboard)
