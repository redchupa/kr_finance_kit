blueprint:
  name: KR Finance Kit — 단기 변동률 알림 (분 단위 자유 입력)
  description: |
    선택한 종목이 지정한 시간 윈도우 안에서 ±임계값을 넘으면 알림.
    예) 30분 안에 ±2% 변동 → 알림.

    KR Finance Kit의 모든 QuoteSensor는 1·5·15·30·60·90·120·180분
    8개 윈도우의 `change_pct_<N>min` attribute를 자동으로 노출합니다.
    이 블루프린트는 그 중 하나를 사용자 선택 → state + template
    트리거로 받습니다.

    📥 **Import 직후 warm-up 필요** — 블루프린트는 즉시 등록되지만 첫
    알림은 선택한 분만큼 가격 샘플이 쌓여야 옵니다 (예 30분 윈도우 =
    HA 시작 후 약 30분).

    ⚠️ **HA 재시작 시 주의** — 가격 history는 메모리에만 보관됩니다.
    HA Restart 직후 N분 윈도우는 약 N분 동안 attribute가 None →
    자동화가 트리거되지 않습니다.

    💡 **종목별 다른 분 트리거**는 이 블루프린트로 자동화를 여러 개
    만들면 됩니다 (자동화 1: 종목=[삼성전자], 윈도우=15 / 자동화 2:
    종목=[비트코인], 윈도우=60 식).
  domain: automation
  source_url: https://github.com/redchupa/kr_finance_kit/blob/main/blueprints/automation/kr_finance_kit/short_window_alert.yaml
  input:
    target_tickers:
      name: 알림 받을 종목
      description: KR Finance Kit이 만든 종목 시세 sensor를 선택하세요. 여러 개 선택 가능.
      selector:
        entity:
          integration: kr_finance_kit
          domain: sensor
          multiple: true
    window_minutes:
      name: 변동률 윈도우 (분)
      description: |
        몇 분 윈도우의 변동률을 트리거로 쓸지. **1·5·15·30·60·90·120·180**
        분 중에서 선택하세요. 다른 분(예 31)을 입력하면 해당 attribute가
        sensor에 없어 트리거되지 않습니다.
      default: 30
      selector:
        number:
          min: 1
          max: 180
          step: 1
          unit_of_measurement: "min"
          mode: box
    drop_threshold_pct:
      name: 하락 임계값 (%)
      description: change_pct가 이 값 이하면 알림. 음수로 입력 (예 -2 = 2% 이상 하락).
      default: -2
      selector:
        number:
          min: -50
          max: 0
          step: 0.5
          unit_of_measurement: "%"
          mode: box
    rise_threshold_pct:
      name: 상승 임계값 (%)
      description: change_pct가 이 값 이상이면 알림. 양수로 입력.
      default: 2
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
          unit_of_measurement: "%"
          mode: box
    notify_target:
      name: 알림 보낼 대상
      description: |
        알림을 받을 모바일 앱(또는 다른 notify entity)을 검색·선택하세요.
        mobile_app 같은 HA 2024.6+ entity-based notify와 호환됩니다.
      selector:
        target:
          entity:
            domain: notify

mode: parallel
max: 30

variables:
  window_min: !input window_minutes
  rise_t: !input rise_threshold_pct
  drop_t: !input drop_threshold_pct
  attr_key: "change_pct_{{ window_min | int }}min"

trigger:
  - platform: state
    entity_id: !input target_tickers

condition:
  - condition: template
    value_template: >-
      {% set v = state_attr(trigger.entity_id, attr_key) %}
      {{ v is not none and (v >= rise_t or v <= drop_t) }}

action:
  - variables:
      pct: "{{ state_attr(trigger.entity_id, attr_key) }}"
      price: "{{ states(trigger.entity_id) }}"
      label: "{{ state_attr(trigger.entity_id, 'friendly_name') or trigger.entity_id }}"
      direction: "{{ '급등' if pct | float >= 0 else '급락' }}"
  - service: notify.send_message
    target: !input notify_target
    data:
      title: "KR Finance Kit · {{ window_min }}분 {{ direction }}"
      message: "{{ label }} {{ window_min }}분 {{ pct }}% — 현재가 {{ price }}"
