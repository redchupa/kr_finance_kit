blueprint:
  name: KR Finance Kit — 종목 가격 변동률 알림
  description: |
    등록된 종목 중에서 알림을 받고 싶은 종목만 골라 임계값을 설정하면,
    어느 하나라도 그 값을 넘는 순간 지정한 알림 서비스로 푸시합니다.

    종목을 빼거나 추가하고 싶으면 블루프린트 입력의 종목 체크박스만
    수정하면 됩니다 — 자동화를 다시 만들 필요 없음.
  domain: automation
  source_url: https://github.com/redchupa/kr_finance_kit/blob/main/blueprints/automation/kr_finance_kit/price_change_alert.yaml
  input:
    target_tickers:
      name: 알림 받을 종목
      description: KR Finance Kit이 만든 종목 시세 sensor를 선택하세요. 여러 개 선택 가능.
      selector:
        entity:
          integration: kr_finance_kit
          domain: sensor
          multiple: true
    drop_threshold_pct:
      name: 하락 임계값 (%)
      description: change_pct가 이 값 이하로 떨어지면 알림. 음수로 입력 (예 -5 = 5% 이상 하락).
      default: -5
      selector:
        number:
          min: -50
          max: 0
          step: 0.5
          unit_of_measurement: "%"
          mode: box
    rise_threshold_pct:
      name: 상승 임계값 (%)
      description: change_pct가 이 값 이상으로 오르면 알림. 양수로 입력 (예 5 = 5% 이상 상승).
      default: 5
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
          unit_of_measurement: "%"
          mode: box
    notify_target:
      name: 알림 보낼 대상
      description: |
        알림을 받을 모바일 앱(또는 다른 notify entity)을 검색·선택하세요.
        여러 개 선택 가능. mobile_app 같은 HA 2024.6+ entity-based notify와
        호환됩니다 (notify.send_message 서비스 사용).
      selector:
        target:
          entity:
            domain: notify

mode: parallel
max: 30

trigger:
  - platform: numeric_state
    entity_id: !input target_tickers
    attribute: change_pct
    above: !input rise_threshold_pct
    id: rise
  - platform: numeric_state
    entity_id: !input target_tickers
    attribute: change_pct
    below: !input drop_threshold_pct
    id: drop

action:
  - variables:
      pct: "{{ state_attr(trigger.entity_id, 'change_pct') }}"
      price: "{{ states(trigger.entity_id) }}"
      label: "{{ state_attr(trigger.entity_id, 'friendly_name') or trigger.entity_id }}"
      direction: "{{ '상승' if trigger.id == 'rise' else '하락' }}"
  - service: notify.send_message
    target: !input notify_target
    data:
      title: "KR Finance Kit · {{ direction }}"
      message: "{{ label }} {{ pct }}% — 현재가 {{ price }}"
